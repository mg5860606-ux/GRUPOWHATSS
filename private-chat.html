.rpk .rpkg{display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
.rpk .rpki{font-size:1.8rem;cursor:pointer;padding:6px;border-radius:8px;transition:all .15s}
.rpk .rpki:hover{background:#f0f2f5;transform:scale(1.2)}
.srb{display:none;padding:8px 14px;background:#fff;border-bottom:1px solid #e0e0e0;align-items:center;gap:8px;flex-shrink:0;animation:apin .2s ease}
.srb.sh{display:flex}
.srb input{flex:1;border:none;background:#f0f2f5;border-radius:18px;padding:8px 14px;font-size:.85rem;outline:none}
.srb input:focus{background:#fff;box-shadow:0 0 0 1px #25d366}
.srb .sc{background:none;border:none;color:#888;font-size:1rem;cursor:pointer;padding:4px}
.srb .sn{font-size:.75rem;font-weight:700;color:#888;white-space:nowrap}
.ct .hb{background:rgba(255,255,255,.1);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.9rem}
.ct .hb:hover{background:rgba(255,255,255,.2)}
@media(min-width:768px){.cp{max-width:100%;margin:0}.ct{border-radius:0}}
@media(max-width:480px){.mb{max-width:92%}.cib{padding:5px 6px}.cm{padding:10px}.ep .ei{font-size:1.1rem;padding:2px 3px}.rpk{bottom:50px}.rpv{margin-left:38px}}
</style>
</head>
<body><div class="cp">
<div class="ct">
<button class="bb" onclick="window.location.href='chat.html'"><i class="fas fa-arrow-left"></i></button>
<div class="ci">
<div class="cav" id="otherAvatar"></div>
<div class="cinfo">
<div class="ctt" id="otherName">Carregando...</div>
<div class="oc"><span id="presenceDot" class="offd"></span><span id="presenceText">offline</span></div>
</div>
</div>
<button class="hb" onclick="toggleSearch()" title="Buscar mensagens"><i class="fas fa-search"></i></button>
<button class="mpb" id="myProfileBtn" onclick="openMyProfile()" title="Meu Perfil"><i class="fas fa-user" style="font-size:.9rem"></i></button>
</div>
<div class="srb" id="searchBar"><input type="text" id="searchInput" placeholder="Buscar mensagens..." autocomplete="off"><span class="sn" id="searchCount"></span><button class="sc" onclick="toggleSearch()"><i class="fas fa-times"></i></button></div>
<div class="cm" id="chatMessages">
<div class="lmb" id="loadingOlder" style="display:none"><i class="fas fa-circle-notch fa-spin"></i> Carregando...</div>
<div id="messagesList"></div>
</div>
<div class="tib" id="typingBar"><div class="tdots"><span></span><span></span><span></span></div><span id="typingText"></span></div>
<div class="ipb" id="imgPreviewBar"><img id="imgPreviewThumb" src="" alt=""><span style="font-size:.78rem;font-weight:700;color:#333">Foto selecionada</span><button class="cip" onclick="cancelImgPreview()"><i class="fas fa-times-circle"></i></button><button class="sip" onclick="sendImage()"><i class="fas fa-paper-plane"></i> Enviar</button></div>
<div class="ipb" id="videoPreviewBar"><video id="videoPreviewThumb" src="" alt="" style="height:45px;width:60px;object-fit:cover;border-radius:8px"></video><span style="font-size:.78rem;font-weight:700;color:#333">Video selecionado</span><button class="cip" onclick="cancelVideoPreview()"><i class="fas fa-times-circle"></i></button><button class="sip" onclick="sendVideoFile()"><i class="fas fa-paper-plane"></i> Enviar</button></div>
<div class="rbb" id="recordingBar"><div class="rd"></div><span class="rt" id="recTime">00:00</span><button class="rc" onclick="cancelRecording()"><i class="fas fa-times"></i> Cancelar</button><button class="rs" onclick="sendAudio()"><i class="fas fa-paper-plane"></i> Enviar</button></div>
<div class="ep" id="emojiPicker"></div>
<div class="sp" id="stickersPicker"></div>
<div class="gifpop" id="gifPopup">
<div class="gifsrch"><input type="text" id="gifSearchInput" placeholder="Buscar GIFs..." autocomplete="off"><button class="abtn" onclick="searchGifs()"><i class="fas fa-search"></i></button></div>
<div class="gifgrid" id="gifGrid"><div class="gifload">Toque para buscar GIFs</div></div>
</div>
<div class="cib" id="chatInputBar">
<div class="apop" id="attachPopup">
<div class="apg">
<div class="api" onclick="document.getElementById('photoInput').click();closeAttach()"><div class="aic" style="background:#7f66ff"><i class="fas fa-image"></i></div><span>Foto</span></div>
<div class="api" onclick="document.getElementById('videoInput').click();closeAttach()"><div class="aic" style="background:#007bfc"><i class="fas fa-video"></i></div><span>Video</span></div>
<div class="api" onclick="toggleGifPicker();closeAttach()"><div class="aic" style="background:#9b59b6"><i class="fas fa-icons"></i></div><span>GIF</span></div>
<div class="api" onclick="toggleStickersPicker();closeAttach()"><div class="aic" style="background:#02a698"><i class="fas fa-star"></i></div><span>Figurinha</span></div>
<div class="api" onclick="toggleEmojiPicker();closeAttach()"><div class="aic" style="background:#ffc107"><i class="fas fa-smile"></i></div><span>Emoji</span></div>
<div class="api" onclick="startRecording();closeAttach()"><div class="aic" style="background:#e74c3c"><i class="fas fa-microphone"></i></div><span>Audio</span></div>
</div>
</div>
<button class="abtn" onclick="toggleAttach()" id="clipBtn" title="Anexar"><i class="fas fa-paperclip"></i></button>
<textarea class="tin" id="chatInput" placeholder="Mensagem..." rows="1" maxlength="1000"></textarea>
<button class="sbn mic" onclick="startRecording()" id="micBtn"><i class="fas fa-microphone"></i></button>
<button class="sbn send" onclick="sendMessage()" id="sendBtn" style="display:none"><i class="fas fa-paper-plane"></i></button>
<input type="file" id="photoInput" accept="image/*" style="display:none" onchange="previewImg(event)">
<input type="file" id="videoInput" accept="video/*" style="display:none" onchange="previewVideo(event)">
</div>
</div>
<div class="rpv" id="replyPreview"><div class="rpx"><div class="rpn" id="replyName"></div><div class="rpt" id="replyText"></div></div><button class="rcl" onclick="cancelReply()"><i class="fas fa-times"></i></button></div>
<div class="rpk" id="reactionPicker"><div class="rpkh"><span></span></div><div class="rpkg" id="reactionGrid"></div></div>
<div class="map" id="msgActionsPopup"><div class="map-top" id="mapReactions"></div><div class="map-divider" id="mapDivider" style="display:none"></div><div class="map-bot" id="mapActions"></div></div>
<div class="mo" id="nickModal"><div class="nmb"><h3>Bem-vindo ao Chat!</h3><p>Escolha um apelido para participar</p><input type="text" id="nickInput" placeholder="Seu apelido..." maxlength="20" autocomplete="off"><button onclick="saveNickname()">Entrar no Chat</button></div></div>
<div class="mo" id="profileModal"><div class="pmb" id="profileModalBox"></div></div>
<div class="fio" id="fullImgOverlay"><button class="cf" onclick="closeFullImg()"><i class="fas fa-times"></i></button><img id="fullImgEl" src="" alt=""><div class="fio-actions"><button onclick="downloadFullImg()"><i class="fas fa-download"></i> Baixar</button></div></div>
<div class="mctx" id="msgContextMenu"><button class="reply-btn" onclick="ctxReplyMsg()" style="color:#00a884"><i class="fas fa-reply" style="color:#00a884"></i> Responder</button><button onclick="ctxEditMsg()"><i class="fas fa-pen"></i> Editar mensagem</button><button onclick="ctxDeleteMsg()"><i class="fas fa-trash"></i> Apagar mensagem</button></div>
<div class="mo" id="editMsgModal"><div class="nmb"><h3>Editar Mensagem</h3><textarea id="editMsgInput" rows="3" maxlength="1000" style="width:100%;padding:10px 14px;border:2px solid #ddd;border-radius:10px;font-size:.9rem;outline:none;font-family:inherit;resize:none"></textarea><div style="display:flex;gap:8px;margin-top:12px"><button onclick="confirmEditMsg()" style="flex:1;background:#25d366;color:#fff;border:none;padding:11px;border-radius:10px;font-size:.9rem;font-weight:700;cursor:pointer">Salvar</button><button onclick="document.getElementById('editMsgModal').classList.remove('sh')" style="flex:1;background:#f0f0f0;color:#555;border:none;padding:11px;border-radius:10px;font-weight:700;cursor:pointer">Cancelar</button></div></div></div>
<div class="mo" id="forwardModal"><div class="nmb"><h3><i class="fas fa-share" style="color:#3498db"></i> Reenviar no Chat</h3><p style="font-size:.82rem;color:#666;margin-bottom:14px">Esta midia sera publicada como uma nova mensagem sua no chat privado.</p><button onclick="forwardToChat()" style="background:#25d366;color:#fff;border:none;width:100%;padding:11px;border-radius:10px;font-size:.9rem;font-weight:700;cursor:pointer;margin-bottom:8px"><i class="fas fa-paper-plane"></i> Reenviar</button><button onclick="closeForwardModal()" style="background:#f0f0f0;color:#555;border:none;width:100%;padding:11px;border-radius:10px;font-size:.9rem;font-weight:800;cursor:pointer">Cancelar</button></div></div>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-storage-compat.js"></script>
<script src="private-chat.js"></script>
</body>
</html>
